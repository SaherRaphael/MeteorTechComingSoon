<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteor Tech Group</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000; 
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* Container for the meteors */
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .meteor {
            position: absolute;
            width: 2px;
            height: 2px;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 50%, rgba(255,255,255,0) 100%);
            border-radius: 50%;
            opacity: 0;
            filter: drop-shadow(0 0 6px white);
            transform: rotate(-35deg); /* Angle of fall */
            animation: shower 3s linear infinite;
        }

        /* The falling animation */
        @keyframes shower {
            0% { transform: rotate(-35deg) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            30% { transform: rotate(-35deg) translateX(-1000px); opacity: 0; }
            100% { transform: rotate(-35deg) translateX(-1000px); opacity: 0; }
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            animation: fadeOutImage 3s ease-in-out 2s forwards;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            opacity: 0;
            padding: 20px;
            animation: fadeInText 2s ease-in-out 4s forwards;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        h1 { font-size: 3.5em; margin: 0; letter-spacing: 4px; line-height: 1.2; }
        p { font-size: 1.2em; opacity: 0.8; margin-top: 10px; letter-spacing: 2px; }

        @media (max-width: 768px) {
            h1 { font-size: 2em; letter-spacing: 2px; }
            p { font-size: 1em; }
        }

        @keyframes fadeOutImage { 0% { opacity: 1; } 100% { opacity: 0; } }
        @keyframes fadeInText { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="starfield" id="starfield"></div>

    <img src="background.png" class="bg-image"> 

    <div class="content">
        <h1>Meteor Tech Group</h1>
        <p>COMING SOON</p>
    </div>

    <script>
        const starfield = document.getElementById('starfield');
        const meteorCount = 15;

        for (let i = 0; i < meteorCount; i++) {
            createMeteor();
        }

        function createMeteor() {
            const meteor = document.createElement('div');
            meteor.className = 'meteor';
            
            // Randomize starting positions
            const topPos = Math.random() * 100 + 'vh';
            const leftPos = Math.random() * 100 + 'vw';
            const delay = Math.random() * 5 + 's';
            const duration = (Math.random() * 2 + 2) + 's';
            const width = (Math.random() * 100 + 50) + 'px'; // Length of the tail

            meteor.style.top = topPos;
            meteor.style.left = leftPos;
            meteor.style.animationDelay = delay;
            meteor.style.animationDuration = duration;
            meteor.style.width = width;

            starfield.appendChild(meteor);
        }
    </script>
</body>
</html>
