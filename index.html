<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteor Tech Group</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000; 
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
	    box-shadow: 0 0 0 100vmax #000 inset;
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            animation: fadeOutImage 3s ease-in-out 2s forwards;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            opacity: 0;
            padding: 20px; /* Prevents text hitting the edges of the phone */
            animation: fadeInText 2s ease-in-out 4s forwards;
        }

        /* Default Desktop Sizes */
        h1 { font-size: 3.5em; margin: 0; letter-spacing: 4px; line-height: 1.2; }
        p { font-size: 1.2em; opacity: 0.8; margin-top: 10px; letter-spacing: 2px; }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            h1 { font-size: 2em; letter-spacing: 2px; }
            p { font-size: 1em; }
        }

        @keyframes fadeOutImage {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes fadeInText {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <img src="background.png" class="bg-image"> 

    <div class="content">
        <h1>Meteor Tech Group</h1>
        <p>COMING SOON</p>
    </div>

</body>
</html>
