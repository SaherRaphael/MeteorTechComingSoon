<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meteor Tech Group</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #111; /* Background color after fade */
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* The Background Image */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            /* Animation: name, duration, timing, delay, fill-mode */
            animation: fadeOutImage 3s ease-in-out 2s forwards;
        }

        /* The Text Container */
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            opacity: 0; /* Hidden at start */
            animation: fadeInText 2s ease-in-out 4s forwards;
        }

        h1 { font-size: 3.5em; margin: 0; letter-spacing: 4px; }
        p { font-size: 1.2em; opacity: 0.8; margin-top: 10px; }

        /* Keyframes for the Image fading out */
        @keyframes fadeOutImage {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Keyframes for the Text fading in */
        @keyframes fadeInText {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <img src="C:\Users\saher\OneDrive\MTG\MeteorTechComingSoon\background.png" 
         class="bg-image">

    <div class="content">
        <h1>Meteor Tech Group</h1>
        <p>COMING SOON</p>
    </div>

</body>
</html>
